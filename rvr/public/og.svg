
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Top accent line -->
  <rect x="80" y="80" width="1040" height="2" fill="url(#accent)" opacity="0.5"/>
  
  <!-- Main text -->
  <text x="80" y="280" font-family="monospace" font-size="160" font-weight="bold" fill="#ffffff" letter-spacing="8">rvr</text>
  
  <!-- Subtitle -->
  <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a1a1aa" letter-spacing="2">tmux + htop for AI agents</text>
  
  <!-- Decorative elements -->
  <rect x="80" y="400" width="200" height="1" fill="#222"/>
  <text x="80" y="440" font-family="monospace" font-size="14" fill="#52525b">launch • monitor • attach</text>
  
  <!-- Bottom accent -->
  <rect x="80" y="580" width="1040" height="1" fill="#222"/>
  <rect x="80" y="400" width="3" height="180" fill="url(#accent)" opacity="0.3"/>
  
  <!-- Terminal-like decoration -->
  <text x="920" y="260" font-family="monospace" font-size="12" fill="#34d399">$</text>
  <text x="940" y="260" font-family="monospace" font-size="12" fill="#666">rvr new</text>
</svg>
